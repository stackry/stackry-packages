name: Validate Package Repository

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Debian repository tools
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y apt-utils dpkg-dev gnupg gzip

      - name: Validate shell scripts
        shell: bash
        run: |
          set -euo pipefail

          bash -n install.sh
          bash -n scripts/publish-apt-repo.sh
          bash -n scripts/resolve-stackry-vision-run.sh
          bash -n tests/test_publish_apt_repo.sh
          bash -n tests/test_resolve_stackry_vision_run.sh

      - name: Run APT publish test
        shell: bash
        run: |
          set -euo pipefail

          tests/test_publish_apt_repo.sh
          tests/test_resolve_stackry_vision_run.sh
